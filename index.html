<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TimeSync — Shared Countdown Timer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(45deg, rgba(102,126,234,0.7), rgba(118,75,162,0.7), rgba(64,224,208,0.7), rgba(255,105,180,0.7));
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      z-index: -1;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .screen { display: none; text-align: center; width: 100%; max-width: 800px; z-index: 10; }
    .active { display: block; animation: fadeIn 0.5s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    h1 { font-size: 3rem; color: white; margin-bottom: 20px; text-shadow: 0 4px 8px rgba(0,0,0,0.3); }

    input {
      width: 100%; padding: 15px; font-size: 1.2rem; border-radius: 12px; border: none;
      margin-bottom: 20px; background: rgba(255,255,255,0.95); box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .time-inputs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
    .time-inputs input { text-align: center; font-weight: bold; margin-bottom: 0; }
    label { display: block; color: white; margin-bottom: 8px; font-weight: 600; text-align: left; }

    button {
      background: linear-gradient(135deg, #3498db 0%, #2471a3 100%); color: white; border: none; padding: 18px; font-size: 1.3rem;
      font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; transition: 0.3s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    }
    button:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.25); }

    #terminateBtn {
      margin-top: 20px; font-size: 1.1rem;
    }

    .timer-title {
      font-size: 3.5rem; color: white; font-weight: 800;
      margin-bottom: 30px; line-height: 1.1;
      text-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .timer-display { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
    .unit { background: rgba(255,255,255,0.95); padding: 15px; border-radius: 15px; min-width: 80px; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
    .val { font-size: 3rem; font-weight: bold; color: #2c3e50; display: block; }
    .lab { font-size: 0.9rem; color: #7f8c8d; text-transform: uppercase; }

    .qr-section { margin: 24px auto; max-width: 220px; text-align: center; }
    .qr-label { color: white; font-size: 1rem; margin-bottom: 12px; font-weight: 600; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
    #qrcode { background: white; border-radius: 12px; padding: 12px; box-shadow: 0 6px 20px rgba(0,0,0,0.25); display: inline-block; }
    .copy-btn {
      background: linear-gradient(135deg, #1abc9c 0%, #16a085 100%); margin-top: 16px; margin-bottom: 20px;
      font-size: 1.1rem; padding: 14px; border-radius: 12px; border: none;
      box-shadow: 0 4px 16px rgba(26,188,156,0.4);
    }
    .copy-btn:hover { background: linear-gradient(135deg, #16a085 0%, #138d75 100%); }

    /* NOTIFICATION BANNER */
    #notifyBanner {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.97); border-radius: 16px; padding: 16px 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25); display: none; align-items: center;
      gap: 16px; z-index: 9998; max-width: 420px; width: 90%;
      animation: slideUp 0.4s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    #notifyBanner p { font-size: 0.95rem; color: #2c3e50; flex: 1; text-align: left; line-height: 1.4; }
    .allow-btn {
      background: #667eea; color: white; border: none; padding: 10px 18px;
      border-radius: 10px; font-size: 0.9rem; font-weight: bold; cursor: pointer;
      width: auto; box-shadow: none;
    }
    .nb-dismiss {
      background: transparent; color: #999; border: none; padding: 10px;
      font-size: 0.85rem; cursor: pointer; width: auto; box-shadow: none;
      text-decoration: underline;
    }
    .allow-btn:hover { background: #5a6fd6; transform: none; box-shadow: none; }
    .nb-dismiss:hover { color: #666; transform: none; box-shadow: none; }

    /* END SCREEN */
    #endScreen {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      display: none; flex-direction: column; justify-content: center;
      align-items: center; z-index: 9999;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    #endScreen::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(45deg, rgba(102,126,234,0.7), rgba(118,75,162,0.7), rgba(64,224,208,0.7), rgba(255,105,180,0.7));
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      z-index: 0;
    }
    #endScreen.active { display: flex; animation: fadeIn 0.5s ease; }

    .end-message {
      font-size: 2.6rem; font-weight: 800; color: white;
      text-align: center; margin-bottom: 50px;
      text-shadow: 0 4px 8px rgba(0,0,0,0.3);
      z-index: 1; padding: 0 20px;
    }

    /* FLUBBER BLOB */
    .blob-wrap {
      position: relative; width: 380px; height: 380px;
      display: flex; align-items: center; justify-content: center;
      z-index: 1;
    }
    .blob {
      width: 360px; height: 360px;
      background: linear-gradient(135deg, #40E0D0 0%, #667eea 40%, #a8edea 70%, #40E0D0 100%);
      background-size: 300% 300%;
      animation: blobColor 4s ease infinite, blobMorph 3s ease-in-out infinite;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 40px rgba(64,224,208,0.5), 0 0 0 0 rgba(64,224,208,0.4);
    }
    @keyframes blobColor {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes blobMorph {
      0%   { border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; transform: scale(1); }
      25%  { border-radius: 40% 60% 30% 70% / 60% 40% 60% 40%; transform: scale(1.06); }
      50%  { border-radius: 70% 30% 50% 50% / 40% 70% 30% 60%; transform: scale(0.96); }
      75%  { border-radius: 30% 70% 60% 40% / 70% 30% 70% 30%; transform: scale(1.04); }
      100% { border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; transform: scale(1); }
    }
    .blob-text {
      color: white; font-size: 2rem; font-weight: 700;
      text-align: center; pointer-events: none;
      text-shadow: 0 2px 6px rgba(0,0,0,0.25);
      letter-spacing: 1px;
    }
    .blob:hover {
      box-shadow: 0 12px 50px rgba(64,224,208,0.7);
      animation: blobColor 2s ease infinite, blobMorphFast 0.8s ease-in-out infinite;
    }
    @keyframes blobMorphFast {
      0%   { border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; transform: scale(1.06); }
      50%  { border-radius: 40% 60% 30% 70% / 60% 40% 60% 40%; transform: scale(1.12); }
      100% { border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; transform: scale(1.06); }
    }
  </style>
</head>
<body>

  <!-- NOTIFICATION BANNER -->
  <div id="notifyBanner">
    <p>🔔 Want a nudge when time's up — even if you switch tabs?</p>
    <button class="allow-btn" onclick="requestNotifyPermission()">Allow</button>
    <button class="nb-dismiss" onclick="dismissNotifyBanner()">No thanks</button>
  </div>

  <!-- 1. INPUT SCREEN -->
  <section id="inputScreen" class="screen active">
    <h1>⏱️ TimeSync</h1>
    <label>🎯 Timer Name or Topic (optional)</label>
    <input type="text" id="timerTitle" placeholder="Team Standup / Game Night..." maxlength="1000">
    <label>⏰ Duration (DD : HH : MM : SS)</label>
    <div class="time-inputs">
      <input type="number" id="days" value="0" min="0">
      <input type="number" id="hours" value="0" min="0">
      <input type="number" id="minutes" value="0" min="0" max="59">
      <input type="number" id="seconds" value="0" min="0" max="59">
    </div>
    <button id="startBtn" onclick="initiateTimer()">🚀 Start Countdown</button>
  </section>

  <!-- 2. TIMER SCREEN -->
  <section id="timerScreen" class="screen">
    <h1 id="displayTitle" class="timer-title">Countdown</h1>
    <div class="timer-display">
      <div class="unit"><span id="dVal" class="val">00</span><span class="lab">Days</span></div>
      <div class="unit"><span id="hVal" class="val">00</span><span class="lab">Hours</span></div>
      <div class="unit"><span id="mVal" class="val">00</span><span class="lab">Mins</span></div>
      <div class="unit"><span id="sVal" class="val">00</span><span class="lab">Secs</span></div>
    </div>
    <div class="qr-section">
      <div class="qr-label">🔗 Share This Synced Timer</div>
      <div id="qrcode"></div>
      <button class="copy-btn" onclick="copyLink()">📋 Copy Synced Link</button>
    </div>
    <button id="terminateBtn" onclick="resetApp()">🛑 End Timer</button>
  </section>

  <!-- 3. END SCREEN -->
  <section id="endScreen">
    <div class="end-message">Got it — I'm on my way! 📞</div>
    <div class="blob-wrap">
      <div class="blob" onclick="stopEverything()">
        <div class="blob-text">Stop</div>
      </div>
    </div>
  </section>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    let timerInt, alarmInt;
    let targetTimestamp = null;
    let audioCtx = null;
    let isAlarmRunning = false;
    let swRegistration = null;
    let notificationScheduled = false;
    let originalTitle = document.title;
    let tabFlashInt = null;

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => { swRegistration = reg; })
        .catch(err => console.log('SW:', err));
    }

    function startTabFlash() {
      const msgs = ['🔴 ⏰ TIME IS UP — TimeSync', '⚡ JOIN NOW — TimeSync ⚡'];
      let i = 0;
      tabFlashInt = setInterval(() => { document.title = msgs[i++ % msgs.length]; }, 700);
    }
    function stopTabFlash() {
      if (tabFlashInt) clearInterval(tabFlashInt);
      document.title = originalTitle;
    }

    function showNotifyBanner() {
      if (!('Notification' in window)) return;
      // If already granted, schedule silently and skip banner
      if (Notification.permission === 'granted') {
        scheduleNotification();
        return;
      }
      // If denied, nothing we can do
      if (Notification.permission === 'denied') return;
      // Default — show the banner
      document.getElementById('notifyBanner').style.display = 'flex';
    }
    function dismissNotifyBanner() {
      document.getElementById('notifyBanner').style.display = 'none';
    }
    function requestNotifyPermission() {
      dismissNotifyBanner();
      Notification.requestPermission().then(p => {
        if (p === 'granted' && !notificationScheduled) {
          // Retry SW if not ready yet
          if (swRegistration && swRegistration.active) {
            scheduleNotification();
          } else {
            navigator.serviceWorker.ready.then(reg => {
              swRegistration = reg;
              scheduleNotification();
            });
          }
        }
      });
    }
    function scheduleNotification() {
      if (!targetTimestamp) return;
      const delay = targetTimestamp - Date.now();
      if (delay <= 0) return;
      const title = document.getElementById('displayTitle').innerText || 'Your timer';
      const msg = { type: 'SCHEDULE_NOTIFICATION', title: `⏰ ${title} — Time to join!`, delay };
      // Wait for SW to be fully active before posting
      navigator.serviceWorker.ready.then(reg => {
        swRegistration = reg;
        if (reg.active) {
          reg.active.postMessage(msg);
          notificationScheduled = true;
        }
      }).catch(e => console.log('SW not ready:', e));
    }

    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function playBeep() {
      if (!isAlarmRunning || !audioCtx) return;
      let osc = audioCtx.createOscillator();
      let gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = 880; gain.gain.value = 0.2;
      osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    }

    function initiateTimer() {
      const d = parseInt(document.getElementById('days').value) || 0;
      const h = parseInt(document.getElementById('hours').value) || 0;
      const m = parseInt(document.getElementById('minutes').value) || 0;
      const s = parseInt(document.getElementById('seconds').value) || 0;
      const total = (d*86400)+(h*3600)+(m*60)+s;
      if (total <= 0) return alert("Please enter a valid time.");
      const title = document.getElementById('timerTitle').value || "Countdown";
      targetTimestamp = Date.now() + (total * 1000);
      const u = new URL(window.location);
      u.searchParams.set('target', targetTimestamp);
      u.searchParams.set('title', encodeURIComponent(title));
      window.history.pushState({}, '', u);
      startVisuals(title);
    }

    function startVisuals(title) {
      initAudio();
      document.getElementById('displayTitle').innerText = decodeURIComponent(title);
      document.getElementById('inputScreen').classList.remove('active');
      document.getElementById('timerScreen').classList.add('active');
      const el = document.getElementById('qrcode');
      el.innerHTML = '';
      new QRCode(el, { text: window.location.href, width: 200, height: 200, colorDark: '#667eea', colorLight: '#ffffff' });
      if (timerInt) clearInterval(timerInt);
      updateTimer();
      timerInt = setInterval(updateTimer, 1000);
      setTimeout(showNotifyBanner, 3000);
      if (Notification.permission === 'granted') scheduleNotification();
    }

    function updateTimer() {
      const diff = targetTimestamp - Date.now();
      if (diff <= 0) { clearInterval(timerInt); showZeros(); triggerEnd(); return; }
      const t = Math.ceil(diff / 1000);
      document.getElementById('dVal').innerText = String(Math.floor(t/86400)).padStart(2,'0');
      document.getElementById('hVal').innerText = String(Math.floor((t%86400)/3600)).padStart(2,'0');
      document.getElementById('mVal').innerText = String(Math.floor((t%3600)/60)).padStart(2,'0');
      document.getElementById('sVal').innerText = String(t%60).padStart(2,'0');
    }

    function showZeros() {
      ['dVal','hVal','mVal','sVal'].forEach(id => document.getElementById(id).innerText = '00');
    }

    function triggerEnd() {
      document.getElementById('endScreen').classList.add('active');
      isAlarmRunning = true;
      playBeep();
      alarmInt = setInterval(playBeep, 500);
      startTabFlash();
    }

    function stopEverything() {
      isAlarmRunning = false;
      if (alarmInt) clearInterval(alarmInt);
      if (timerInt) clearInterval(timerInt);
      stopTabFlash();
      document.getElementById('endScreen').classList.remove('active');
      window.history.pushState({}, '', window.location.pathname);
      resetApp();
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
    }

    function resetApp() {
      if (timerInt) { clearInterval(timerInt); timerInt = null; }
      if (alarmInt) { clearInterval(alarmInt); alarmInt = null; }
      isAlarmRunning = false; notificationScheduled = false;
      stopTabFlash();
      if (audioCtx && audioCtx.state !== 'closed') { audioCtx.close(); audioCtx = null; }
      document.getElementById('timerScreen').classList.remove('active');
      document.getElementById('inputScreen').classList.add('active');
      showZeros();
      document.getElementById('timerTitle').value = '';
      ['days','hours','minutes','seconds'].forEach(id => document.getElementById(id).value = '0');
      document.getElementById('qrcode').innerHTML = '';
      window.history.replaceState({}, '', window.location.pathname);
    }

    function copyLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = document.querySelector('.copy-btn');
        const orig = btn.textContent;
        btn.textContent = '✅ Copied!';
        setTimeout(() => { btn.textContent = orig; }, 2000);
      });
    }

    window.onload = function() {
      const p = new URLSearchParams(window.location.search);
      const tp = p.get('target'), ti = p.get('title');
      if (tp) {
        targetTimestamp = parseInt(tp);
        const title = ti ? decodeURIComponent(ti) : "Shared Timer";
        if (targetTimestamp > Date.now()) { startVisuals(title); }
        else {
          document.getElementById('displayTitle').innerText = title;
          document.getElementById('inputScreen').classList.remove('active');
          document.getElementById('timerScreen').classList.add('active');
          showZeros();
        }
      }
      ['days','hours','minutes','seconds'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => {
          if (e.key === 'Enter') {
            const d=parseInt(document.getElementById('days').value)||0;
            const h=parseInt(document.getElementById('hours').value)||0;
            const m=parseInt(document.getElementById('minutes').value)||0;
            const s=parseInt(document.getElementById('seconds').value)||0;
            if(d+h+m+s>0) initiateTimer();
          }
        });
      });
    };
  </script>
</body>
</html>
